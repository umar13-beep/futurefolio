<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FutureFolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            position: relative;
        }
        .brand {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            font-weight: 700;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.25);
        }
        .btn-primary {
            background: linear-gradient(90deg, #667eea, #764ba2);
            border: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .status-indicator {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .status-online {
            background-color: #10b981;
            box-shadow: 0 0 10px #10b981;
        }
        .status-offline {
            background-color: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }
        .test-account {
            background-color: #f3f4f6;
            border-radius: 8px;
            padding: 10px;
            margin-top: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <!-- Status Indicator -->
        <div class="status-indicator" id="statusIndicator"></div>
        
        <div class="brand">
            <i class="fas fa-chart-line"></i> FutureFolio
        </div>
        
        <h4 class="text-center mb-4">Welcome Back</h4>
        
        <!-- Test Account Info -->
        <div class="test-account">
            <strong><i class="fas fa-vial"></i> Test Account:</strong><br>
            Email: <code>test@example.com</code><br>
            Password: <code>123456</code>
        </div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" 
                       placeholder="you@example.com" value="test@example.com">
            </div>
            
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" 
                       placeholder="••••••••" value="123456">
            </div>
            
            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </div>
            
            <div class="d-grid mb-3">
                <button type="button" class="btn btn-success" onclick="quickLogin()">
                    <i class="fas fa-bolt"></i> Quick Login (Test Account)
                </button>
            </div>
            
            <div class="text-center">
                <p class="mb-0">Don't have an account? 
                    <a href="register.html" class="text-decoration-none">Sign up</a>
                </p>
                <a href="index.html" class="text-decoration-none">
                    <i class="fas fa-home"></i> Back to Home
                </a>
            </div>
        </form>
        
        <!-- Message Display -->
        <div id="message" class="mt-3"></div>
        
        <!-- Connection Test Results -->
        <div id="connectionTest" class="mt-3 small text-muted"></div>
    </div>

    <!-- JavaScript -->
    <script>
        // Global variables
        let backendOnline = false;
        
        // Test backend connection on page load
        document.addEventListener('DOMContentLoaded', async function() {
            console.log("🔍 Testing backend connection...");
            
            // Update status indicator
            const statusIndicator = document.getElementById('statusIndicator');
            statusIndicator.className = 'status-indicator status-offline';
            
            // Check if already logged in
            const savedUser = localStorage.getItem('user');
            if (savedUser) {
                console.log("User already logged in, redirecting to dashboard...");
                window.location.href = 'dashboard.html';
                return;
            }
            
            // Test backend connection
            await testBackendConnection();
            
            // Auto-fill test credentials for convenience
            document.getElementById('email').value = 'test@example.com';
            document.getElementById('password').value = '123456';
        });
        
        // Test backend connection
        async function testBackendConnection() {
            const connectionDiv = document.getElementById('connectionTest');
            const statusIndicator = document.getElementById('statusIndicator');
            
            connectionDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Testing connection...';
            
            try {
                // Try multiple endpoints
                const response = await fetch('/api/status', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    console.log("✅ Backend connected:", data);
                    
                    backendOnline = true;
                    statusIndicator.className = 'status-indicator status-online';
                    
                    connectionDiv.innerHTML = `
                        <div class="text-success">
                            <i class="fas fa-check-circle"></i> Backend connected!
                            <br><small>Server: ${data.app || 'FutureFolio'} (${data.status || 'Online'})</small>
                        </div>
                    `;
                    
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
                
            } catch (error) {
                console.error("❌ Backend connection failed:", error);
                
                backendOnline = false;
                statusIndicator.className = 'status-indicator status-offline';
                
                connectionDiv.innerHTML = `
                    <div class="text-danger">
                        <i class="fas fa-exclamation-triangle"></i> Cannot connect to backend
                        <br><small>Error: ${error.message}</small>
                        <br><small>Make sure the server is running on port 5000</small>
                    </div>
                `;
                
                // Show offline mode instructions
                showMessage(`
                    <div class="alert alert-warning">
                        <strong><i class="fas fa-exclamation-triangle"></i> Offline Mode</strong><br>
                        Backend server is not running. You can:<br>
                        1. Start backend: <code>python app.py</code><br>
                        2. Use <button class="btn btn-sm btn-success" onclick="quickLogin()">Quick Login</button> for demo
                    </div>
                `, 'warning');
            }
        }
        
        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            
            // Basic validation
            if (!email || !password) {
                showMessage('Please enter both email and password', 'error');
                return;
            }
            
            // Disable button and show loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            
            try {
                console.log(`📤 Sending login request for: ${email}`);
                
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });
                
                console.log(`📥 Response status: ${response.status}`);
                
                // Get response as text first
                const responseText = await response.text();
                console.log('Raw response:', responseText);
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (parseError) {
                    console.error('Failed to parse JSON:', parseError);
                    throw new Error('Server returned invalid JSON');
                }
                
                if (data.success === true) {
                    // Save user data to localStorage
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('login_time', new Date().toISOString());
                    
                    console.log('✅ Login successful, user data:', data.user);
                    
                    showMessage(`
                        <div class="alert alert-success">
                            <i class="fas fa-check-circle"></i> <strong>Login Successful!</strong><br>
                            Welcome back, ${data.user.name || email}<br>
                            <small>Redirecting to dashboard...</small>
                        </div>
                    `, 'success');
                    
                    // Redirect after delay
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                    
                } else {
                    throw new Error(data.error || 'Login failed');
                }
                
            } catch (error) {
                console.error('❌ Login error:', error);
                
                let errorMessage = error.message;
                
                // Specific error handling
                if (error.message.includes('Failed to fetch') || 
                    error.message.includes('NetworkError')) {
                    errorMessage = 'Cannot connect to server. Make sure backend is running.';
                    
                    // Offer offline mode
                    showMessage(`
                        <div class="alert alert-danger">
                            <i class="fas fa-unlink"></i> <strong>Connection Error</strong><br>
                            ${errorMessage}<br><br>
                            <button class="btn btn-sm btn-warning" onclick="useOfflineMode()">
                                <i class="fas fa-user-clock"></i> Use Offline Demo Mode
                            </button>
                        </div>
                    `, 'error');
                    
                } else {
                    showMessage(errorMessage, 'error');
                }
                
            } finally {
                // Re-enable button
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });
        
        // Quick login with test account
        function quickLogin() {
            console.log('🚀 Quick login triggered');
            
            // Create mock user data
            const mockUser = {
                email: 'test@example.com',
                name: 'Test User',
                balance: 100000,
                is_demo: true,
                demo_message: 'Using offline demo mode'
            };
            
            // Save to localStorage
            localStorage.setItem('user', JSON.stringify(mockUser));
            localStorage.setItem('demo_mode', 'true');
            
            showMessage(`
                <div class="alert alert-success">
                    <i class="fas fa-rocket"></i> <strong>Quick Login Successful!</strong><br>
                    Using demo mode with test account<br>
                    <small>Redirecting to dashboard...</small>
                </div>
            `, 'success');
            
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        }
        
        // Use offline mode
        function useOfflineMode() {
            if (confirm('Use offline demo mode? This will work without backend server.')) {
                quickLogin();
            }
        }
        
        // Helper function to show messages
        function showMessage(content, type = 'info') {
            const messageDiv = document.getElementById('message');
            
            // Clear previous messages
            messageDiv.innerHTML = '';
            
            // Create message element
            const messageElement = document.createElement('div');
            
            // Add appropriate classes based on type
            switch(type) {
                case 'success':
                    messageElement.className = 'alert alert-success';
                    break;
                case 'error':
                    messageElement.className = 'alert alert-danger';
                    break;
                case 'warning':
                    messageElement.className = 'alert alert-warning';
                    break;
                case 'info':
                default:
                    messageElement.className = 'alert alert-info';
            }
            
            // Set content (can be HTML)
            messageElement.innerHTML = content;
            
            // Add to message div
            messageDiv.appendChild(messageElement);
            
            // Auto-remove success messages after 5 seconds
            if (type === 'success') {
                setTimeout(() => {
                    if (messageDiv.contains(messageElement)) {
                        messageElement.style.opacity = '0';
                        messageElement.style.transition = 'opacity 0.5s';
                        setTimeout(() => {
                            if (messageDiv.contains(messageElement)) {
                                messageDiv.removeChild(messageElement);
                            }
                        }, 500);
                    }
                }, 5000);
            }
        }
        
        // Keyboard shortcut: Ctrl+Enter to submit
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
        
        // Auto-test connection every 10 seconds
        setInterval(testBackendConnection, 10000);
    </script>
</body>
</html>
